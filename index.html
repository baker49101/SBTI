<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 移动端适配：禁止用户缩放，保证布局稳定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- iOS 全屏 Web App 支持 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <!-- 禁止 iOS 自动识别电话号码 -->
  <meta name="format-detection" content="telephone=no" />
  <!-- 微信/小红书分享时的页面描述 -->
  <meta name="description" content="MBTI 已经过时，WTNL 来了。30 道题测出你的真实人格，不保证准确，保证好笑。" />
  <!-- ================================================================
       修改这里可以改网页标题（浏览器标签页显示的文字）
  ================================================================ -->
  <title>WTNL人格测试 · 我太难了人格测试</title>

  <style>
    /* ================================================================
       视觉样式区
       主题颜色统一在 :root 的 CSS 变量里管理，改一处全局生效
    ================================================================ */

    :root {
      /* ---- 主题色 ---- */
      --clr-primary:       #9333ea;   /* 深紫，主要按钮/强调 */
      --clr-primary-mid:   #c084fc;   /* 中紫，进度条/图标 */
      --clr-primary-light: #ede9fe;   /* 浅紫，背景填充 */
      --clr-accent:        #ec4899;   /* 玫粉，匹配度等高亮 */
      --clr-accent-light:  #fce7f3;   /* 浅粉，选项选中背景 */

      /* ---- 文字色 ---- */
      --clr-text:          #374151;   /* 主文字 */
      --clr-text-sub:      #6b7280;   /* 次要文字 */
      --clr-text-hint:     #9ca3af;   /* 提示/占位文字 */

      /* ---- 背景/卡片 ---- */
      --bg-page: linear-gradient(150deg, #fdf2f8 0%, #f5f0ff 45%, #ede9fe 100%);
      --bg-card: rgba(255, 255, 255, 0.80);
      --clr-border: rgba(192, 132, 252, 0.22);
      --shadow-card: 0 4px 24px rgba(147, 51, 234, 0.10);

      /* ---- 圆角 ---- */
      --radius-card: 20px;
      --radius-btn:  16px;
      --radius-sm:   12px;

      /* ---- 过渡 ---- */
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ---- Reset ---- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent; /* 消除移动端点击高亮 */
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%; /* 防止 iOS 旋转时字号自动调大 */
    }

    body {
      min-height: 100%;
      background: var(--bg-page);
      background-attachment: fixed;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC',
                   'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
      color: var(--clr-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 加载中禁止一切点击（pointer-events 在加载完成后由 JS 移除） */
    body.is-loading {
      pointer-events: none;
    }

    /* ================================================================
       背景装饰 —— 三个模糊光晕球，纯 CSS，不影响点击
    ================================================================ */
    .bg-deco {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-deco span {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
    }
    .bg-deco .d1 { width: 420px; height: 420px; background: #f9a8d4; top: -120px; right: -100px; }
    .bg-deco .d2 { width: 320px; height: 320px; background: #c084fc; bottom: 60px;  left: -80px;  }
    .bg-deco .d3 { width: 280px; height: 280px; background: #e0d7ff; top: 38%;    left: 55%;    }

    /* ================================================================
       三屏公共样式
    ================================================================ */
    .screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 隐藏状态：display:none */
    .screen.is-hidden {
      display: none;
    }

    /* 进场动画 */
    .screen.enter-anim {
      animation: screenEnter 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    @keyframes screenEnter {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ================================================================
       加载页
    ================================================================ */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg-page);
      background-attachment: fixed;
      justify-content: center;
      gap: 28px;
      padding: 40px 24px;
      text-align: center;
    }

    /* 品牌徽章 */
    .ld-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--clr-primary), var(--clr-primary-mid));
      color: #fff;
      font-size: clamp(32px, 10vw, 56px);
      font-weight: 900;
      letter-spacing: 5px;
      padding: 10px 28px 12px;
      border-radius: var(--radius-card);
      box-shadow: 0 8px 32px rgba(147, 51, 234, 0.32);
    }

    .ld-tagline {
      font-size: clamp(13px, 3.6vw, 16px);
      color: var(--clr-text-sub);
      letter-spacing: 1px;
      margin-top: 8px;
    }

    /* 旋转菊花 */
    .ld-spinner {
      width: 52px;
      height: 52px;
      border: 4px solid var(--clr-primary-light);
      border-top-color: var(--clr-primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 进度条 */
    .ld-progress-wrap {
      width: min(320px, 78vw);
    }
    .ld-progress-track {
      height: 8px;
      background: var(--clr-primary-light);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .ld-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--clr-primary-mid), var(--clr-primary));
      border-radius: 100px;
      transition: width 0.2s ease;
    }
    .ld-percent {
      font-size: 14px;
      font-weight: 600;
      color: var(--clr-primary);
    }

    .ld-tip {
      font-size: 13px;
      color: var(--clr-text-hint);
    }

    /* ================================================================
       答题页
    ================================================================ */
    #quiz-screen {
      justify-content: flex-start;
      padding-bottom: 100px; /* 为底部固定按钮留空 */
    }

    /* 顶部吸顶 Header */
    .quiz-header {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: rgba(253, 242, 248, 0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--clr-border);
    }

    .quiz-title {
      font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 800;
      background: linear-gradient(135deg, var(--clr-primary), var(--clr-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 8px;
    }

    .quiz-prog-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .quiz-prog-track {
      flex: 1;
      height: 6px;
      background: var(--clr-primary-light);
      border-radius: 100px;
      overflow: hidden;
    }
    .quiz-prog-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--clr-accent), var(--clr-primary));
      border-radius: 100px;
      transition: width var(--transition);
    }
    .quiz-prog-text {
      font-size: 13px;
      font-weight: 700;
      color: var(--clr-primary);
      white-space: nowrap;
      min-width: 48px;
      text-align: right;
    }

    /* 题目列表容器 */
    .questions-wrap {
      width: 100%;
      max-width: 640px;
      padding: 18px 14px;
    }

    /* 单题卡片 */
    .q-card {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: var(--radius-card);
      border: 1px solid var(--clr-border);
      box-shadow: var(--shadow-card);
      padding: 18px 16px;
      margin-bottom: 14px;
      transition: box-shadow var(--transition);
    }
    /* 未答高亮脉冲（JS 临时添加） */
    .q-card.pulse {
      box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.38), var(--shadow-card);
    }

    .q-no {
      font-size: 11px;
      font-weight: 700;
      color: var(--clr-primary-mid);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .q-title {
      font-size: clamp(14px, 4vw, 16px);
      font-weight: 600;
      color: var(--clr-text);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .opts-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    /* 选项按钮 —— 超大点击区域，手机友好 */
    .opt-btn {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      width: 100%;
      min-height: 50px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.68);
      border: 2px solid var(--clr-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-align: left;
      font-size: clamp(13px, 3.8vw, 15px);
      color: var(--clr-text);
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    /* 悬停效果 */
    .opt-btn:hover {
      border-color: var(--clr-primary-mid);
      transform: translateY(-1px);
      box-shadow: 0 3px 14px rgba(192, 132, 252, 0.18);
    }
    /* 点击按下效果 */
    .opt-btn:active { transform: scale(0.985); }

    /* 选中态 */
    .opt-btn.is-selected {
      border-color: var(--clr-primary);
      background: linear-gradient(135deg, var(--clr-accent-light), var(--clr-primary-light));
      box-shadow: 0 3px 16px rgba(147, 51, 234, 0.15);
    }

    /* 圆形指示器 */
    .opt-dot {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--clr-border);
      background: #fff;
      transition: all var(--transition);
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .opt-btn.is-selected .opt-dot {
      border-color: var(--clr-primary);
      background: var(--clr-primary);
    }
    .opt-btn.is-selected .opt-dot::after {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fff;
    }

    .opt-text {
      flex: 1;
      line-height: 1.55;
    }

    /* 底部固定提交栏 */
    .quiz-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 18px calc(10px + env(safe-area-inset-bottom));
      background: rgba(253, 242, 248, 0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--clr-border);
      z-index: 100;
    }

    .submit-btn {
      display: block;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      height: 52px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: all var(--transition);
      background: linear-gradient(135deg, var(--clr-primary-mid), var(--clr-primary));
      box-shadow: 0 4px 20px rgba(147, 51, 234, 0.28);
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(147, 51, 234, 0.38);
    }
    .submit-btn:active { transform: scale(0.98); }

    /* 未解锁（答题未完成）状态 */
    .submit-btn.is-locked {
      background: linear-gradient(135deg, #d1d5db, #9ca3af);
      box-shadow: none;
      cursor: not-allowed;
    }
    .submit-btn.is-locked:hover {
      transform: none;
      box-shadow: none;
    }

    /* ================================================================
       结果页
    ================================================================ */
    #result-screen {
      justify-content: flex-start;
      padding: 22px 0 48px;
    }

    .result-wrap {
      width: 100%;
      max-width: 640px;
      padding: 0 14px;
    }

    /* 主人格卡片 */
    .personality-card {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: var(--radius-card);
      border: 1px solid var(--clr-border);
      box-shadow: var(--shadow-card);
      padding: 28px 22px 24px;
      margin-bottom: 14px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    /* 卡片内光斑装饰 */
    .personality-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 30%, rgba(249, 168, 212, 0.18), transparent 60%),
        radial-gradient(ellipse at 25% 75%, rgba(192, 132, 252, 0.14), transparent 55%);
      pointer-events: none;
    }

    .res-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2.5px;
      color: var(--clr-text-sub);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .res-code {
      font-size: clamp(44px, 14vw, 68px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--clr-primary), var(--clr-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .res-name {
      font-size: clamp(22px, 6.5vw, 30px);
      font-weight: 800;
      color: var(--clr-text);
      margin-bottom: 16px;
    }

    .res-match-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 18px;
    }
    .res-match-label {
      font-size: 14px;
      color: var(--clr-text-sub);
    }
    .res-match-value {
      font-size: clamp(30px, 9vw, 40px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--clr-primary), var(--clr-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 系统备注框 */
    .res-remark {
      background: linear-gradient(135deg,
        rgba(252, 231, 243, 0.6), rgba(237, 233, 254, 0.6));
      border: 1px solid rgba(192, 132, 252, 0.22);
      border-radius: var(--radius-sm);
      padding: 11px 15px;
      font-size: 14px;
      color: var(--clr-text-sub);
      font-style: italic;
      line-height: 1.65;
    }

    /* 解读/维度卡片公共样式 */
    .info-card {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: var(--radius-card);
      border: 1px solid var(--clr-border);
      box-shadow: var(--shadow-card);
      padding: 22px 20px;
      margin-bottom: 14px;
    }

    /* 卡片标题（左侧竖线装饰） */
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--clr-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .card-title::before {
      content: '';
      display: block;
      width: 4px;
      height: 17px;
      background: linear-gradient(to bottom, var(--clr-primary), var(--clr-accent));
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* 解读正文 */
    .res-detail {
      font-size: clamp(14px, 3.8vw, 15px);
      color: var(--clr-text);
      line-height: 1.85;
      white-space: pre-wrap;
    }

    /* 维度单行 */
    .dim-item { margin-bottom: 13px; }
    .dim-item:last-child { margin-bottom: 0; }
    .dim-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .dim-name {
      font-size: 13px;
      color: var(--clr-text);
      font-weight: 500;
    }
    .dim-score {
      font-size: 13px;
      font-weight: 700;
      color: var(--clr-primary);
    }
    .dim-track {
      height: 7px;
      background: var(--clr-primary-light);
      border-radius: 100px;
      overflow: hidden;
    }
    .dim-fill {
      height: 100%;
      width: 0%; /* 初始为 0，JS 触发动画 */
      background: linear-gradient(90deg, var(--clr-accent), var(--clr-primary));
      border-radius: 100px;
      transition: width 0.85s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 重新测试按钮 */
    .retry-btn {
      display: block;
      width: 100%;
      height: 52px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--clr-primary);
      background: #fff;
      border: 2px solid var(--clr-primary-mid);
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: all var(--transition);
      margin-bottom: 28px;
    }
    .retry-btn:hover {
      background: var(--clr-primary-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(192, 132, 252, 0.2);
    }
    .retry-btn:active { transform: scale(0.98); }

    /* 页脚声明 */
    .footer {
      text-align: center;
      padding: 0 4px calc(20px + env(safe-area-inset-bottom));
      font-size: 12px;
      color: var(--clr-text-hint);
      line-height: 1.9;
    }
    .footer-line {
      width: 36px;
      height: 1px;
      background: var(--clr-border);
      margin: 0 auto 12px;
    }

    /* ================================================================
       Toast 轻提示
    ================================================================ */
    #toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(55, 65, 81, 0.90);
      color: #fff;
      padding: 11px 20px;
      border-radius: 100px;
      font-size: 14px;
      white-space: nowrap;
      z-index: 8888;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      max-width: calc(100vw - 48px);
      white-space: normal;
      text-align: center;
    }
    #toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ================================================================
       人格图片卡样式
    ================================================================ */

    /* 图片容器：圆角卡片，图片全宽展示，匹配度徽章绝对定位 */
    .personality-img-card {
      position: relative;
      width: 100%;
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--clr-border);
      margin-bottom: 14px;
      background: #fff;
    }

    /* 人格插图：宽度撑满，高度自适应，展示完整卡片图 */
    .personality-img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    /* 匹配度浮层：右下角半透明胶囊 */
    .match-badge {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 8px 14px 6px;
      box-shadow: 0 2px 12px rgba(147, 51, 234, 0.15);
      border: 1px solid rgba(192, 132, 252, 0.25);
    }

    .match-badge-label {
      font-size: 11px;
      color: var(--clr-text-sub);
      font-weight: 600;
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 3px;
    }

    .match-badge-value {
      font-size: clamp(22px, 7vw, 30px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--clr-primary), var(--clr-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 系统备注卡片内间距微调 */
    .remark-card {
      padding: 16px 20px;
    }

    /* 图片加载占位（图片未加载前显示渐变背景） */
    .personality-img-card.is-loading-img {
      min-height: 200px;
      background: linear-gradient(135deg, var(--clr-accent-light), var(--clr-primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ================================================================
       响应式补充（宽屏微调）
    ================================================================ */
    @media (min-width: 480px) {
      .questions-wrap  { padding: 22px 18px; }
      .result-wrap     { padding: 0 18px; }
    }
    @media (min-width: 768px) {
      .quiz-header     { padding: 18px 28px 12px; }
      .questions-wrap  { padding: 26px 24px; }
    }
  </style>
</head>

<body class="is-loading">

    /* ================================================================
       维度配置区
       ----------------------------------------------------------------
       共 15 个维度，用于结果页进度条可视化
       修改维度名称：直接改 name 字段
       每个维度的实际数值由评分算法自动生成，无需手动设置
    ================================================================ */
    const dimensionConfig = [
      { name: "精神稳定度",     corr: +0.65 }, // 正相关：分越高越稳定
      { name: "社交续航力",     corr: +0.70 }, // 正相关
      { name: "摆烂天赋值",     corr: -0.75 }, // 负相关：分越低越会摆烂
      { name: "内耗指数",       corr: -0.60 }, // 负相关：分越低内耗越重
      { name: "嘴硬程度",       corr: +0.30 }, // 弱正相关
      { name: "整活能力",       corr: +0.45 }, // 正相关
      { name: "躺平意志力",     corr: -0.68 }, // 负相关：分越低越能躺
      { name: "情绪敏感度",     corr: -0.40 }, // 负相关：分越低越敏感
      { name: "翻车频率",       corr: -0.50 }, // 负相关：分越低翻车越多
      { name: "救场能力",       corr: +0.65 }, // 正相关
      { name: "自我感觉良好度", corr: +0.42 }, // 正相关
      { name: "佛系指数",       corr: -0.55 }, // 负相关：分越低越佛
      { name: "输出欲望值",     corr: +0.58 }, // 正相关
      { name: "防刺能力",       corr: +0.38 }, // 正相关
      { name: "宇宙感知力",     corr: +0.25 }  // 弱正相关
    ];

    /* ================================================================
       交互逻辑区
       非必要请勿修改以下代码
    ================================================================ */

    // ---------- 全局状态 ----------
    const answers = {};                    // { 题目id: 分值 }
    const TOTAL_Q = questionBank.length;   // 总题数，与题库同步
    let dimScoresCache = [];               // 缓存维度分，供结果页动画使用

    // ---------- 工具函数 ----------

    /**
     * 显示 Toast 轻提示
     * @param {string} msg      提示文字
     * @param {number} duration 显示时长（毫秒）
     */
    function showToast(msg, duration) {
      duration = duration || 2200;
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('is-visible');
      setTimeout(function() { el.classList.remove('is-visible'); }, duration);
    }

    /**
     * 切换屏幕：隐藏所有屏幕，显示目标屏幕并播放进场动画
     * @param {string} id 目标屏幕的元素 id
     */
    function showScreen(id) {
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) {
        screens[i].classList.add('is-hidden');
        screens[i].classList.remove('enter-anim');
      }
      var target = document.getElementById(id);
      target.classList.remove('is-hidden');
      // 强制 reflow 后再加动画类，确保动画每次都触发
      void target.offsetWidth;
      target.classList.add('enter-anim');
      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    // ---------- 加载逻辑 ----------

    /**
     * 启动加载进度条动画。
     * 页面资源未加载完成时，进度条停在 ~80%；
     * 资源加载完成（window.load）后，快速推进至 100%，然后跳转答题页。
     * 全程 body.is-loading 阻止所有点击。
     */
    function startLoading() {
      var bar     = document.getElementById('ld-bar');
      var pctEl   = document.getElementById('ld-pct');
      var progress      = 0;
      var loaded        = false;

      // 监听页面资源加载完成
      if (document.readyState === 'complete') {
        loaded = true;
      } else {
        window.addEventListener('load', function() { loaded = true; });
      }
      // 保底：最多 5 秒后强制继续
      setTimeout(function() { loaded = true; }, 5000);

      var timer = setInterval(function() {
        var target = loaded ? 100 : 80;
        if (progress < target) {
          var step = loaded
            ? Math.max(4, (100 - progress) / 6)
            : (Math.random() * 6 + 2);
          progress = Math.min(progress + step, target);
          bar.style.width     = Math.floor(progress) + '%';
          pctEl.textContent   = Math.floor(progress) + '%';
        }
        if (progress >= 100) {
          clearInterval(timer);
          // 短暂停留，让用户看到 100%
          setTimeout(function() {
            document.body.classList.remove('is-loading');
            renderQuestions();
            showScreen('quiz-screen');
          }, 450);
        }
      }, 80);
    }

    // ---------- 答题页渲染 ----------

    /**
     * 将题库渲染为 DOM，并重置所有选中状态。
     * 每次调用都会完全重建题目列表（用于重置测试）。
     */
    function renderQuestions() {
      var wrap = document.getElementById('questions-wrap');
      wrap.innerHTML = '';

      questionBank.forEach(function(q) {
        var card = document.createElement('div');
        card.className = 'q-card';
        card.id = 'qc-' + q.id;

        var optHtml = q.options.map(function(opt, idx) {
          var letter = String.fromCharCode(65 + idx); // A / B / C
          return '<button class="opt-btn"'
            + ' onclick="selectOption(' + q.id + ',' + opt.score + ',this)"'
            + ' data-score="' + opt.score + '">'
            + '<span class="opt-dot"></span>'
            + '<span class="opt-text">' + letter + '. ' + opt.text + '</span>'
            + '</button>';
        }).join('');

        card.innerHTML =
          '<div class="q-no">Q' + q.id + ' / ' + TOTAL_Q + '</div>'
          + '<div class="q-title">' + q.title + '</div>'
          + '<div class="opts-list" id="opts-' + q.id + '">' + optHtml + '</div>';

        wrap.appendChild(card);
      });
    }

    /**
     * 处理选项点击事件
     * @param {number}      qid   题目 id
     * @param {number}      score 选项分值
     * @param {HTMLElement} btn   被点击的按钮
     */
    function selectOption(qid, score, btn) {
      // 取消同题其他选项的选中态
      var opts = document.getElementById('opts-' + qid);
      var allBtns = opts.querySelectorAll('.opt-btn');
      for (var i = 0; i < allBtns.length; i++) {
        allBtns[i].classList.remove('is-selected');
      }
      btn.classList.add('is-selected');

      var wasNew = answers[qid] === undefined;
      answers[qid] = score;
      updateProgress();

      // 首次作答该题时，滚动到下一道未答题
      if (wasNew) {
        var nextQ = null;
        for (var j = 0; j < questionBank.length; j++) {
          if (answers[questionBank[j].id] === undefined) {
            nextQ = questionBank[j];
            break;
          }
        }
        if (nextQ) {
          var nextCard = document.getElementById('qc-' + nextQ.id);
          if (nextCard) {
            setTimeout(function() {
              nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 180);
          }
        }
      }
    }

    /**
     * 更新顶部进度条和提交按钮状态
     */
    function updateProgress() {
      var done  = Object.keys(answers).length;
      var ratio = done / TOTAL_Q;
      document.getElementById('quiz-prog-bar').style.width  = (ratio * 100) + '%';
      document.getElementById('quiz-prog-text').textContent = done + ' / ' + TOTAL_Q;

      var btn = document.getElementById('submit-btn');
      if (done >= TOTAL_Q) {
        btn.classList.remove('is-locked');
        btn.textContent = '✦ 查看我的人格结果';
      } else {
        btn.classList.add('is-locked');
        btn.textContent = '查看我的人格结果';
      }
    }

    // ---------- 提交与计算 ----------

    /**
     * 点击提交按钮的处理函数。
     * 未答完时给出提示并定位到第一道未答题；
     * 答完后计算结果并跳转结果页。
     */
    function handleSubmit() {
      var done = Object.keys(answers).length;
      if (done < TOTAL_Q) {
        var left = TOTAL_Q - done;
        showToast('还有 ' + left + ' 道题没作答，答完才能看结果哦～');
        // 定位到第一道未答题并高亮提示
        for (var i = 0; i < questionBank.length; i++) {
          if (answers[questionBank[i].id] === undefined) {
            var card = document.getElementById('qc-' + questionBank[i].id);
            if (card) {
              card.scrollIntoView({ behavior: 'smooth', block: 'center' });
              card.classList.add('pulse');
              setTimeout(function(c) {
                return function() { c.classList.remove('pulse'); };
              }(card), 1600);
            }
            break;
          }
        }
        return;
      }

      var result = calcResult();
      renderResult(result);
      showScreen('result-screen');

      // 延迟触发维度条动画（等进场动画完成后）
      setTimeout(function() {
        for (var k = 0; k < dimScoresCache.length; k++) {
          var fill = document.getElementById('df-' + k);
          if (fill) fill.style.width = dimScoresCache[k] + '%';
        }
      }, 450);
    }

    /**
     * 根据答题结果计算人格类型、匹配度和 15 维度分值
     * @returns {{ type, matchRate, dimScores }}
     */
    function calcResult() {
      // 累加总分
      var total = 0;
      var vals  = Object.values(answers);
      for (var i = 0; i < vals.length; i++) total += vals[i];

      // 按区间匹配人格类型（默认取最后一种保底）
      var matched = personalityTypes[personalityTypes.length - 1];
      for (var j = 0; j < personalityTypes.length; j++) {
        var pt = personalityTypes[j];
        if (total >= pt.minScore && total <= pt.maxScore) {
          matched = pt;
          break;
        }
      }

      // 匹配度：总分越接近区间中心，匹配度越高（82~97 区间）
      var center    = (matched.minScore + matched.maxScore) / 2;
      var halfRange = Math.max((matched.maxScore - matched.minScore) / 2, 1);
      var dist      = Math.abs(total - center);
      var matchRate = Math.round(97 - (dist / halfRange) * 15);
      matchRate     = Math.max(82, Math.min(97, matchRate));

      // 生成 15 维度分值
      var dimScores = calcDimScores(total, vals);
      dimScoresCache = dimScores; // 缓存供动画使用

      return { type: matched, matchRate: matchRate, dimScores: dimScores, total: total };
    }

    /**
     * 根据总分和答题值生成 15 个维度的娱乐化评分（35~98）。
     * 每个维度有一个与总分的相关系数（corr），影响分值方向；
     * 同时加入基于具体答题的「个性化扰动」，让结果看起来更像测出来的。
     *
     * @param {number}   total 总分
     * @param {number[]} vals  所有答题分值数组
     * @returns {number[]} 15 个维度分值数组
     */
    function calcDimScores(total, vals) {
      var base = (total - 30) / 60; // 归一化至 0~1
      var scores = [];

      for (var i = 0; i < dimensionConfig.length; i++) {
        var corr = dimensionConfig[i].corr;
        var baseVal;

        if (corr > 0) {
          // 正相关：base 越大，分越高
          baseVal = 38 + base * 52 * corr + (1 - Math.abs(corr)) * 14;
        } else {
          // 负相关：base 越大，分越低
          baseVal = 95 - base * 52 * Math.abs(corr) - (1 - Math.abs(corr)) * 12;
        }

        // 个性化扰动：基于第 i*7 % n 题的答题值偏移 ±6
        var seed  = vals[(i * 7) % vals.length] || 2;
        var noise = (seed - 2) * 3; // -3 / 0 / +3

        var score = Math.round(baseVal + noise);
        scores.push(Math.max(35, Math.min(98, score)));
      }

      return scores;
    }

    // ---------- 结果页渲染 ----------

    /**
     * 将结果数据写入结果页 DOM
     * 维度进度条宽度初始为 0，由 handleSubmit 延迟触发动画
     *
     * @param {{ type, matchRate, dimScores }} result
     */
    function renderResult(result) {
      var t = result.type;
      document.getElementById('res-match').textContent  = result.matchRate + '%';
      document.getElementById('res-remark').textContent = t.remark;
      document.getElementById('res-detail').textContent = t.detail;

      // 设置人格插图：文件名规则为 assets/type_代码.png
      var imgWrap = document.querySelector('.personality-img-card');
      var imgEl   = document.getElementById('res-img');
      imgWrap.classList.add('is-loading-img');
      imgEl.onload = function() {
        imgWrap.classList.remove('is-loading-img');
      };
      imgEl.onerror = function() {
        // 图片加载失败时，退化为纯文字卡片
        imgWrap.classList.remove('is-loading-img');
        imgWrap.innerHTML =
          '<div style="padding:28px 22px 24px;text-align:center;">'
          + '<div class="res-label">你的人格类型是</div>'
          + '<div class="res-code">' + t.code + '</div>'
          + '<div class="res-name">' + t.name + '</div>'
          + '</div>'
          + '<div class="match-badge"><span class="match-badge-label">匹配度</span>'
          + '<span class="match-badge-value" id="res-match">' + result.matchRate + '%</span></div>';
      };
      imgEl.alt = t.name + ' · ' + t.code;
      imgEl.src = 'assets/type_' + t.code + '.png';

      // 渲染 15 维度评分条
      var wrap = document.getElementById('dims-wrap');
      wrap.innerHTML = '';
      dimensionConfig.forEach(function(dim, i) {
        var score = result.dimScores[i];
        var item  = document.createElement('div');
        item.className = 'dim-item';
        item.innerHTML =
          '<div class="dim-row">'
          + '<span class="dim-name">' + dim.name + '</span>'
          + '<span class="dim-score">' + score + '</span>'
          + '</div>'
          + '<div class="dim-track">'
          + '<div class="dim-fill" id="df-' + i + '" style="width:0%"></div>'
          + '</div>';
        wrap.appendChild(item);
      });
    }

    // ---------- 重新测试 ----------

    /**
     * 清空所有答案，重新渲染题目，跳回答题页
     */
    function handleRetry() {
      // 清空答题记录
      var keys = Object.keys(answers);
      for (var i = 0; i < keys.length; i++) delete answers[keys[i]];
      dimScoresCache = [];

      renderQuestions();
      updateProgress();
      showScreen('quiz-screen');
    }

    // ---------- 启动 ----------
    startLoading();
  </script>
</body>
</html>
